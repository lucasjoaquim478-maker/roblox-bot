<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Bot - Configurador</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <div class="logo-icon">🤖</div>
        <div>
          <h1>Roblox Bot</h1>
          <p class="subtitle">Automação de tarefas + login automático</p>
        </div>
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Parado</span>
      </div>
    </header>

    <main>
      <!-- Login -->
      <section class="card">
        <div class="card-header">
          <label>🔑 Login Roblox</label>
          <div class="card-actions">
            <button id="btnLogin" class="btn btn-sm btn-primary">Login Automático</button>
            <button id="btnLoginGame" class="btn btn-sm btn-success">Login + Jogar</button>
          </div>
        </div>
        <div class="form-row">
          <input type="text" id="loginUser" class="input" placeholder="Usuário ou email" style="flex:1">
          <input type="password" id="loginPass" class="input" placeholder="Senha" style="flex:1">
        </div>
        <p class="hint">O bot abre roblox.com/login, preenche os dados e clica em Entrar. As credenciais ficam salvas só no seu PC.</p>
      </section>

      <!-- Game Config -->
      <section class="card">
        <div class="card-header">
          <label>🎮 Jogo Roblox</label>
        </div>
        <div class="form-row">
          <input type="text" id="gameUrl" class="input" placeholder="URL do jogo (ex: https://www.roblox.com/games/...)">
          <button id="btnOpenGame" class="btn btn-secondary" title="Abrir no navegador">Abrir</button>
          <button id="btnPlayDirect" class="btn btn-sm btn-success">▶ Jogar Direto</button>
        </div>
        <p class="hint">"Jogar Direto" abre o jogo e clica em Play (use quando ja estiver logado).</p>
      </section>

      <!-- Task List -->
      <section class="card">
        <div class="card-header">
          <label>📋 Tarefas</label>
          <div class="card-actions">
            <button id="btnAddTask" class="btn btn-sm btn-primary">+ Adicionar</button>
            <button id="btnClearTasks" class="btn btn-sm btn-secondary">Limpar</button>
          </div>
        </div>

        <div class="task-toolbar">
          <div class="toolbar-group">
            <button class="task-btn" data-type="click" title="Clica na posição">🖱️ Click</button>
            <button class="task-btn" data-type="key" title="Pressiona tecla">⌨️ Tecla</button>
            <button class="task-btn" data-type="wait" title="Aguarda tempo">⏳ Esperar</button>
            <button class="task-btn" data-type="type" title="Digita texto">📝 Digitar</button>
            <button class="task-btn" data-type="scroll" title="Rola a tela">📜 Scroll</button>
            <button class="task-btn" data-type="focus" title="Foca no Roblox">🎯 Focar</button>
            <button class="task-btn" data-type="move" title="Move mouse">📍 Mover</button>
            <button class="task-btn" data-type="open" title="Abre URL no navegador">🌐 Abrir</button>
            <button class="task-btn" data-type="play" title="Abre jogo e clica em Play">▶️ Jogar</button>
          </div>
          <button id="btnGetPos" class="btn btn-sm btn-secondary">📍 Capturar Posição</button>
        </div>

        <div id="taskList" class="task-list">
          <div class="empty">Nenhuma tarefa.</div>
        </div>

        <div class="task-options">
          <label class="checkbox-label">
            <input type="checkbox" id="loopToggle">
            🔁 Repetir tarefas em loop
          </label>
        </div>
      </section>

      <!-- Control -->
      <section class="card control-card">
        <button id="btnStart" class="btn btn-primary btn-large">
          <span class="btn-icon">▶</span>
          <span>Iniciar Bot</span>
        </button>
        <button id="btnStop" class="btn btn-danger btn-large" disabled>
          <span class="btn-icon">⏹</span>
          <span>Parar Bot</span>
        </button>
        <button id="btnSave" class="btn btn-secondary btn-large">
          <span class="btn-icon">💾</span>
          <span>Salvar</span>
        </button>
      </section>

      <!-- Log -->
      <section class="card">
        <div class="card-header">
          <label>📜 Log</label>
          <button id="btnClearLog" class="btn btn-sm btn-secondary">Limpar</button>
        </div>
        <pre id="logOutput" class="log-box">Bot aguardando início...</pre>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
